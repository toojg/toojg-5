# Static site — no build step. Netlify serves the repo root as-is.
[build]
  publish = "."
  command = ""

# Long-cache the fonts (they're content-hashed by filename in practice — bump
# the filename if you ever swap a cut, e.g. when licensing Roobert Light).
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Keep the experiments preview out of search indexes.
[[headers]]
  for = "/experiments.html"
  [headers.values]
    X-Robots-Tag = "noindex"
